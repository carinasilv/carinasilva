<!DOCTYPE html>

<html>
    <head>
        <title> Cat > Mouse > Dog </title>
        <meta charset="UTF-8">
        <link rel="stylesheet"  type="text/css"   href="css/style.css">
        <link rel="stylesheet" href="https://use.typekit.net/zyo8eej.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">

    <body>
        
        <section id="top_right">
            <h1> CAT > MOUSE > DOG </h1>
            <h2 id="reset"> HOW TO PLAY</h2>

            <div id="scoreboard">

                <h3 id="p1score"></h3>

                <h3 id="center_text">
                    Everyday you and your neighbor let your pet's into the yard.
                    <br>
                    Do not let their mean pets intimidate you. Click a pet to start. 
                </h3>

                <h3 id="c2score"></h3>
            </div>

            <div id="first_btns">
                <button class="first_btn cat" value="0"></button>
                <button class="first_btn mouse" value="1"></button>
                <button class="first_btn dog" value="2"></button>            
            </div>    
            
        </section>


        <section id="bottom_left">
            <div class="results">
                <img src="images/you.png" alt="">
                <img src="images/oSmall.png"" alt="" class="symbol">
                <img src="images/neighbor.png" alt="">
            </div>
        </section>


    <script type="text/javascript" src="scripts/scripts.js"></script>
